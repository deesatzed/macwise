name: Public install smoke

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact published release-candidate version, without the v prefix
        required: true
        type: string

permissions:
  contents: read

jobs:
  uv-tool:
    runs-on: macos-26
    env:
      VERSION: ${{ inputs.version }}
      UV_TOOL_DIR: ${{ runner.temp }}/uv-tools
      UV_TOOL_BIN_DIR: ${{ runner.temp }}/uv-bin
    steps:
      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12"

      - name: Validate requested identity
        shell: bash
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^1\.0\.0rc[0-9]+$ ]]

      - name: Install from public PyPI with UV
        run: uv tool install "macwise==$VERSION" --python 3.12 --prerelease allow

      - name: Smoke public UV tool command
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$UV_TOOL_BIN_DIR:$PATH"
          test "$(macwise --version)" = "MacWise $VERSION"
          macwise setup codex --help

  cross-channel-identity:
    needs: [uv-tool]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Check out verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Verify PyPI, GitHub, and checksums agree
        run: python3 scripts/verify_public_release.py "$VERSION"
