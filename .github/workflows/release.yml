name: Release candidate

on:
  push:
    tags:
      - "v1.0.0rc*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true

      - name: Require exact release-candidate identity
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          [[ "$VERSION" =~ ^1\.0\.0rc[0-9]+$ ]]
          test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Verify locked candidate
        run: |
          uv sync --locked --all-groups
          uv run --frozen pytest
          uv run --frozen ruff format --check .
          uv run --frozen ruff check .
          uv run --frozen pyright

      - name: Build and inspect distributions
        run: |
          uv build
          uv run --frozen twine check dist/*
          sha256sum dist/* > SHA256SUMS

      - name: Upload immutable candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: |
            dist/
            SHA256SUMS
          if-no-files-found: error

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/macwise/
    permissions:
      id-token: write
    steps:
      - name: Download accepted candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: candidate

      - name: Publish with PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: candidate/dist

  release:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download published candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: candidate

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            candidate/dist/*
            candidate/SHA256SUMS
