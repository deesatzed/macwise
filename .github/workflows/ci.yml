name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, macos-26]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync locked dependencies
        run: uv sync --locked --all-groups

      - name: Test
        run: uv run --frozen pytest

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Type check
        run: uv run --frozen pyright

      - name: Verify public repository privacy contract
        run: uv run --frozen pytest tests/repository/test_public_foundation.py

      - name: Build wheel and source distribution
        run: uv build

  evaluator:
    name: evaluator / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.13"
          enable-cache: true

      - name: Sync evaluator dependencies
        run: uv sync --directory evaluator --locked

      - name: Verify evaluator on exact hosted tuple
        run: |
          sw_vers -productVersion
          sw_vers -buildVersion
          uname -rm
          uv lock --directory evaluator --check
          uv run --directory evaluator pytest tests -q
          uv run --directory evaluator ruff format --check .
          uv run --directory evaluator ruff check .
          uv run --directory evaluator pyright
