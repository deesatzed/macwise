name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync locked dependencies
        run: uv sync --locked --all-groups

      - name: Test
        run: uv run --frozen pytest

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Type check
        run: uv run --frozen pyright

      - name: Verify public repository privacy contract
        run: uv run --frozen pytest tests/repository/test_public_foundation.py

      - name: Build wheel and source distribution
        run: uv build

  homebrew-candidate:
    name: Homebrew candidate / macOS
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          python-version: "3.13"
          enable-cache: true

      - name: Build exact local source artifact
        shell: bash
        run: |
          set -euo pipefail
          uv build --sdist --out-dir "$RUNNER_TEMP/dist"
          echo "ARTIFACT=$RUNNER_TEMP/dist/macwise-1.0.0rc1.tar.gz" >> "$GITHUB_ENV"

      - name: Audit public formula candidate
        run: brew audit --strict packaging/homebrew/Formula/macwise.rb

      - name: Install and test from ephemeral local tap
        shell: bash
        run: |
          set -euo pipefail
          brew tap-new macwise-local/tap
          TAP_ROOT="$(brew --repository macwise-local/tap)"
          cp packaging/homebrew/Formula/macwise.rb "$TAP_ROOT/Formula/macwise.rb"
          FORMULA="$TAP_ROOT/Formula/macwise.rb" ruby -e '
            path = ENV.fetch("FORMULA")
            text = File.read(path)
            text.sub!(%r{https://github.com/deesatzed/macwise/releases/download/v1\.0\.0rc1/macwise-1\.0\.0rc1\.tar\.gz}, "file://#{ENV.fetch("ARTIFACT")}")
            File.write(path, text)
          '
          brew install --build-from-source macwise-local/tap/macwise
          brew test macwise-local/tap/macwise

      - name: Remove ephemeral candidate
        if: always()
        run: |
          brew uninstall --force macwise || true
          brew untap macwise-local/tap || true
